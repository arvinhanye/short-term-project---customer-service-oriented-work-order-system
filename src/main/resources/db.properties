mysql.url=jdbc:mysql://localhost:3306/ticket_management?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
mysql.username=root
mysql.password=
mysql.write.url=jdbc:mysql://localhost:3306/ticket_management?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
mysql.write.username=root
mysql.write.password=
mysql.read.url=jdbc:mysql://localhost:3306/ticket_management?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
mysql.read.username=root
mysql.read.password=
# Swing 客户端单实例默认值；读库仅在 mysql.read.url 指向独立只读实例时产生分流效果。
mysql.pool.maximumPoolSize=4
mysql.pool.minimumIdle=1
mysql.write.pool.maximumPoolSize=4
mysql.write.pool.minimumIdle=1
mysql.read.pool.maximumPoolSize=2
mysql.read.pool.minimumIdle=1
mysql.pool.connectionTimeoutMs=30000
mysql.pool.idleTimeoutMs=600000
mysql.pool.maxLifetimeMs=1800000
mysql.pool.leakDetectionThresholdMs=0

mongodb.uri=mongodb://localhost:27017
mongodb.database=ticket_management_logs
